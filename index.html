<style>
  
    body {
      background: url(https://file.garden/afOYRSlbYh0xRrrF/bg1.png);
      background-size: cover;
      margin: 0;
      font-family:'Times New Roman', Times, serif;
      font-size: 0.9rem;
      font-weight: 100;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .layout {
      position: relative;
      width: 80vw;
      aspect-ratio: 16 / 7; 
      background: url(
        https://cdn.discordapp.om/attachments/1093968552853254276/1499854576185114734/image.png?ex=69f64fec&is=69f4fe6c&hm=34e4d2e4e959ed834740fd2ffd4c8673fa747e06b1db856e9411eafc9d1ca89b
      ) center/contain no-repeat;
    }

    .box {
      position: absolute;
      transform: translate(-50%, -50%);
      aspect-ratio: 1 / 1;
    }

    .character { top: 20%; left: 80.5%; width: 18%; transform: rotate(30deg);}
    .worldbuilding { top: 40%; left: 20%; width: 18%; transform: rotate(20deg);}
    .credits { top: 50%; left: 62%; width: 18%; transform: rotateY(10deg);} 
    .vein {top:70%; right:-50%; width:60%;}
    .vein2 {top:70%; right:30%; width:60%;}
    .logo { width:30%; right:19%;}
    .box img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      transition: transform 0.2s ease;
    }

    .character img {transition: all step-end;}
    .worldbuilding img {transition: all step-end;} 
    .credits img {transition: all step-end;}
  
    .character img:hover {transform: rotate(10deg);}
    .worldbuilding img:hover {transform: rotate(10deg);} 
    .credits img:hover {transform: rotate(10deg);}  
  </style>
</head>
